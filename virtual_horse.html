<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>Mi Caballo Virtual</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --sky: #c9e8f7;
    --sky2: #e8f6fd;
    --ground: #6dbf67;
    --ground2: #4fa349;
    --dirt: #c8a96e;
    --brown: #A0784A;
    --brown-dark: #7A5230;
    --brown-light: #C8A06A;
    --cream: #f5efe6;
    --accent: #e05c2a;
    --accent2: #f0a030;
    --purple: #8b6dd6;
    --teal: #3dbfa0;
    --pink: #e87090;
    --white: #ffffff;
    --shadow: rgba(0,0,0,0.10);
    --font: 'Nunito', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--font);
    background: linear-gradient(180deg, #b0d8f0 0%, var(--sky) 60%, var(--sky2) 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* ─── HEADER ─── */
  header {
    width: 100%;
    padding: 18px 20px 8px;
    text-align: center;
  }
  header h1 {
    font-size: 26px;
    font-weight: 800;
    color: #3a2010;
    letter-spacing: -0.5px;
    text-shadow: 0 2px 0 rgba(255,255,255,0.6);
  }
  header p {
    font-size: 13px;
    color: #6a4828;
    font-weight: 600;
    margin-top: 2px;
  }

  /* ─── STATS ─── */
  .stats {
    width: calc(100% - 32px);
    max-width: 420px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin: 8px 0 12px;
  }
  .stat-card {
    background: rgba(255,255,255,0.75);
    border-radius: 14px;
    padding: 8px 10px;
    box-shadow: 0 2px 8px var(--shadow);
    backdrop-filter: blur(4px);
  }
  .stat-top {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-bottom: 5px;
  }
  .stat-icon { font-size: 14px; }
  .stat-label { font-size: 10px; font-weight: 700; color: #5a3a20; text-transform: uppercase; letter-spacing: 0.3px; }
  .stat-bar { height: 7px; border-radius: 4px; background: rgba(0,0,0,0.08); overflow: hidden; }
  .stat-fill { height: 100%; border-radius: 4px; transition: width 0.5s cubic-bezier(.4,0,.2,1); }
  .fill-happy { background: linear-gradient(90deg, #f07050, #e84080); }
  .fill-hunger { background: linear-gradient(90deg, #30c090, #20a870); }
  .fill-energy { background: linear-gradient(90deg, #60a8e8, #4080d0); }

  /* ─── MOOD ─── */
  .mood-bar {
    width: calc(100% - 32px);
    max-width: 420px;
    background: rgba(255,255,255,0.7);
    border-radius: 20px;
    padding: 7px 16px;
    text-align: center;
    font-size: 13px;
    font-weight: 700;
    color: #4a2e10;
    margin-bottom: 10px;
    box-shadow: 0 2px 8px var(--shadow);
    backdrop-filter: blur(4px);
    min-height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ─── SCENE ─── */
  .scene {
    width: calc(100% - 32px);
    max-width: 420px;
    height: 220px;
    border-radius: 22px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 6px 24px rgba(0,0,0,0.15);
    background: linear-gradient(180deg, #c9e8f7 0%, #e0f4fc 60%, #c9e8f7 100%);
    margin-bottom: 14px;
    touch-action: none;
  }

  /* clouds */
  .cloud {
    position: absolute;
    background: rgba(255,255,255,0.85);
    border-radius: 50px;
    animation: drift linear infinite;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: rgba(255,255,255,0.85);
    border-radius: 50%;
  }
  .cloud1 { width: 70px; height: 22px; top: 18px; animation-duration: 28s; animation-delay: -10s; }
  .cloud1::before { width: 32px; height: 32px; top: -14px; left: 10px; }
  .cloud1::after { width: 22px; height: 22px; top: -10px; left: 28px; }
  .cloud2 { width: 50px; height: 16px; top: 38px; animation-duration: 36s; animation-delay: -20s; opacity: 0.6; }
  .cloud2::before { width: 22px; height: 22px; top: -10px; left: 8px; }
  .cloud2::after { width: 16px; height: 16px; top: -7px; left: 20px; }
  @keyframes drift {
    from { left: -100px; }
    to { left: 110%; }
  }

  /* sun */
  .sun {
    position: absolute;
    top: 14px; right: 20px;
    width: 36px; height: 36px;
    background: radial-gradient(circle, #ffe060 60%, #ffa020 100%);
    border-radius: 50%;
    box-shadow: 0 0 16px 4px rgba(255,200,0,0.35);
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{box-shadow:0 0 16px 4px rgba(255,200,0,0.35)} 50%{box-shadow:0 0 24px 8px rgba(255,200,0,0.5)} }

  /* ground layers */
  .ground-layer {
    position: absolute;
    bottom: 0; left: 0; right: 0;
  }
  .ground-grass {
    bottom: 0;
    height: 52px;
    background: linear-gradient(180deg, var(--ground) 0%, var(--ground2) 100%);
  }
  .ground-stripe {
    bottom: 46px;
    height: 10px;
    background: #5abf55;
    opacity: 0.5;
    border-radius: 0;
  }
  .ground-dirt {
    bottom: 0;
    height: 16px;
    background: var(--dirt);
    opacity: 0.4;
  }

  /* flowers */
  .flower {
    position: absolute;
    bottom: 50px;
    font-size: 16px;
    animation: sway 2.5s ease-in-out infinite;
    transform-origin: bottom center;
  }
  @keyframes sway { 0%,100%{transform:rotate(-4deg)} 50%{transform:rotate(4deg)} }

  /* horse */
  .horse-wrap {
    position: absolute;
    bottom: 48px;
    transition: left 0.45s cubic-bezier(.4,0,.2,1);
  }
  #horse-svg {
    display: block;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.18));
  }

  /* apple / food */
  .food-item {
    position: absolute;
    bottom: 50px;
    font-size: 26px;
    display: none;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    transition: left 0.3s;
  }

  /* sleep z */
  .zzz {
    position: absolute;
    top: 24px; left: 50%;
    transform: translateX(-50%);
    font-size: 15px;
    color: rgba(60,40,20,0.5);
    font-weight: 800;
    letter-spacing: 2px;
    opacity: 0;
    transition: opacity 0.5s;
    pointer-events: none;
  }

  /* speech bubble */
  .speech {
    position: absolute;
    top: 10px; left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.95);
    border-radius: 16px;
    padding: 5px 14px;
    font-size: 13px;
    font-weight: 700;
    color: #3a2010;
    white-space: nowrap;
    box-shadow: 0 2px 10px var(--shadow);
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .speech::after {
    content: '';
    position: absolute;
    bottom: -7px;
    left: 50%; transform: translateX(-50%);
    border: 7px solid transparent;
    border-top-color: rgba(255,255,255,0.95);
    border-bottom: none;
  }
  .speech.show { opacity: 1; }

  /* floating hearts */
  .heart {
    position: absolute;
    font-size: 18px;
    opacity: 0;
    pointer-events: none;
    animation: floatHeart 1.1s ease-out forwards;
  }
  @keyframes floatHeart {
    0%  { opacity: 1; transform: translateY(0) scale(1); }
    100%{ opacity: 0; transform: translateY(-55px) scale(1.4); }
  }

  /* ─── BUTTONS ─── */
  .actions {
    width: calc(100% - 32px);
    max-width: 420px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  .btn {
    background: rgba(255,255,255,0.85);
    border: none;
    border-radius: 18px;
    padding: 14px 8px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    box-shadow: 0 3px 12px var(--shadow);
    transition: transform 0.12s, box-shadow 0.12s, background 0.12s;
    backdrop-filter: blur(4px);
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { transform: scale(0.93); box-shadow: 0 1px 6px var(--shadow); }
  .btn-icon { font-size: 28px; line-height: 1; }
  .btn-label { font-size: 11px; font-weight: 800; color: #4a2e10; text-transform: uppercase; letter-spacing: 0.3px; }
  .btn-pet   { background: linear-gradient(135deg, rgba(255,220,200,0.9), rgba(255,255,255,0.85)); }
  .btn-ride  { background: linear-gradient(135deg, rgba(200,220,255,0.9), rgba(255,255,255,0.85)); }
  .btn-feed  { background: linear-gradient(135deg, rgba(200,255,220,0.9), rgba(255,255,255,0.85)); }

  /* ─── FOOTER ─── */
  footer {
    font-size: 11px;
    color: rgba(60,40,20,0.45);
    font-weight: 600;
    padding-bottom: 16px;
  }
</style>
</head>
<body>

<header>
  <h1>🐴 Mi Caballo Virtual</h1>
  <p id="horse-name">¡Cuida a tu caballo!</p>
</header>

<!-- STATS -->
<div class="stats">
  <div class="stat-card">
    <div class="stat-top"><span class="stat-icon">😊</span><span class="stat-label">Felicidad</span></div>
    <div class="stat-bar"><div class="stat-fill fill-happy" id="h-bar" style="width:80%"></div></div>
  </div>
  <div class="stat-card">
    <div class="stat-top"><span class="stat-icon">🍎</span><span class="stat-label">Hambre</span></div>
    <div class="stat-bar"><div class="stat-fill fill-hunger" id="f-bar" style="width:60%"></div></div>
  </div>
  <div class="stat-card">
    <div class="stat-top"><span class="stat-icon">⚡</span><span class="stat-label">Energía</span></div>
    <div class="stat-bar"><div class="stat-fill fill-energy" id="e-bar" style="width:70%"></div></div>
  </div>
</div>

<!-- MOOD -->
<div class="mood-bar" id="mood-text">😊 Tu caballo está tranquilo</div>

<!-- SCENE -->
<div class="scene" id="scene">
  <!-- sky elements -->
  <div class="sun"></div>
  <div class="cloud cloud1"></div>
  <div class="cloud cloud2"></div>

  <!-- ground -->
  <div class="ground-layer ground-grass"></div>
  <div class="ground-layer ground-stripe"></div>
  <div class="ground-layer ground-dirt"></div>

  <!-- flowers -->
  <div class="flower" style="left:18px;animation-delay:0s">🌸</div>
  <div class="flower" style="left:55px;animation-delay:0.5s;font-size:12px">🌼</div>
  <div class="flower" style="left:310px;animation-delay:1s">🌸</div>
  <div class="flower" style="left:340px;animation-delay:0.3s;font-size:12px">🌼</div>

  <!-- food -->
  <div class="food-item" id="food">🍎</div>

  <!-- zzz -->
  <div class="zzz" id="zzz">💤 zzz</div>

  <!-- horse -->
  <div class="horse-wrap" id="horse" style="left:110px">
    <svg id="horse-svg" width="120" height="115" viewBox="0 0 120 115">
      <defs>
        <filter id="soft" x="-10%" y="-10%" width="120%" height="120%">
          <feGaussianBlur stdDeviation="0.5"/>
        </filter>
      </defs>
      <!-- tail strands -->
      <path id="tail1" d="M105 60 Q122 52 118 36 Q116 24 122 16" fill="none" stroke="#5A3418" stroke-width="5" stroke-linecap="round"/>
      <path id="tail2" d="M105 62 Q124 58 121 46 Q119 35 126 28" fill="none" stroke="#7A5230" stroke-width="3.5" stroke-linecap="round"/>
      <path id="tail3" d="M104 65 Q118 65 120 55 Q122 45 128 40" fill="none" stroke="#5A3418" stroke-width="2.5" stroke-linecap="round"/>
      <!-- body -->
      <ellipse cx="66" cy="70" rx="40" ry="24" fill="#A0784A"/>
      <ellipse cx="66" cy="68" rx="38" ry="20" fill="#B0885A"/>
      <!-- belly highlight -->
      <ellipse cx="64" cy="78" rx="22" ry="10" fill="#C8A070" opacity="0.5"/>
      <!-- neck -->
      <path d="M33 60 Q26 40 34 26 Q40 14 50 18 Q58 22 52 42 Q46 56 38 62 Z" fill="#A8804E"/>
      <!-- mane base -->
      <path id="mane" d="M35 24 Q30 16 32 8 Q36 0 44 6 Q50 2 52 10 Q56 4 60 10 Q56 18 50 20 Q44 16 40 20 Q38 24 35 24 Z" fill="#4A2810"/>
      <!-- mane shine -->
      <path d="M38 10 Q40 6 44 8 Q42 14 38 16 Z" fill="rgba(255,255,255,0.15)"/>
      <!-- head -->
      <ellipse cx="24" cy="30" rx="16" ry="12" fill="#A8804E" transform="rotate(-22 24 30)"/>
      <!-- forehead star -->
      <ellipse cx="26" cy="18" rx="5" ry="4" fill="white" opacity="0.7" transform="rotate(-22 26 18)"/>
      <!-- snout -->
      <ellipse cx="13" cy="38" rx="11" ry="8" fill="#C09868" transform="rotate(-22 13 38)"/>
      <!-- nostrils -->
      <ellipse cx="9" cy="40" rx="2.8" ry="1.8" fill="#7A5230" transform="rotate(-22 9 40)"/>
      <ellipse cx="16" cy="42" rx="2.8" ry="1.8" fill="#7A5230" transform="rotate(-22 16 42)"/>
      <!-- eye -->
      <ellipse id="eye-outer" cx="28" cy="23" rx="4.5" ry="3.5" fill="#1A0A00" transform="rotate(-22 28 23)"/>
      <ellipse cx="27" cy="22" rx="2" ry="1.5" fill="white" opacity="0.8" transform="rotate(-22 27 22)"/>
      <ellipse id="eye-pupil" cx="28" cy="23" rx="3" ry="2.2" fill="#2A1000" transform="rotate(-22 28 23)"/>
      <!-- eyelash -->
      <path d="M25 20 Q28 17 31 20" fill="none" stroke="#1A0A00" stroke-width="1.2" stroke-linecap="round" transform="rotate(-22 28 20)"/>
      <!-- ear -->
      <path d="M40 12 Q44 2 50 6 Q48 16 44 19 Z" fill="#A8804E"/>
      <path d="M41 13 Q44 5 49 8 Q47 15 43 17 Z" fill="#E0A090"/>
      <!-- legs back -->
      <rect x="76" y="88" width="11" height="26" rx="5" fill="#8A6838"/>
      <rect x="92" y="90" width="11" height="24" rx="5" fill="#9A7848"/>
      <!-- legs front -->
      <rect x="36" y="86" width="11" height="28" rx="5" fill="#9A7848"/>
      <rect x="52" y="88" width="11" height="26" rx="5" fill="#8A6838"/>
      <!-- hooves -->
      <ellipse cx="81" cy="114" rx="7" ry="3.5" fill="#2A1A08"/>
      <ellipse cx="97" cy="114" rx="7" ry="3.5" fill="#2A1A08"/>
      <ellipse cx="41" cy="114" rx="7" ry="3.5" fill="#2A1A08"/>
      <ellipse cx="57" cy="114" rx="7" ry="3.5" fill="#2A1A08"/>
      <!-- blush (hidden) -->
      <ellipse id="blush" cx="16" cy="33" rx="5" ry="3" fill="#E87090" opacity="0" transform="rotate(-22 16 33)"/>
      <!-- sparkles (hidden) -->
      <g id="sparkles" opacity="0">
        <text x="62" y="20" font-size="13" fill="#F0997B" font-family="sans-serif">✦</text>
        <text x="80" y="12" font-size="10" fill="#8b6dd6" font-family="sans-serif">✦</text>
        <text x="70" y="32" font-size="15" fill="#3dbfa0" font-family="sans-serif">✦</text>
      </g>
      <!-- sweat drop (galloping, hidden) -->
      <ellipse id="sweat" cx="50" cy="14" rx="4" ry="6" fill="#60C0E0" opacity="0"/>
    </svg>
  </div>

  <!-- speech -->
  <div class="speech" id="speech"></div>
</div>

<!-- BUTTONS -->
<div class="actions">
  <button class="btn btn-pet" onclick="petHorse()">
    <span class="btn-icon">🤚</span>
    <span class="btn-label">Acariciar</span>
  </button>
  <button class="btn btn-ride" onclick="gallop()">
    <span class="btn-icon">🏇</span>
    <span class="btn-label">Galopar</span>
  </button>
  <button class="btn btn-feed" onclick="feedHorse()">
    <span class="btn-icon">🍎</span>
    <span class="btn-label">Dar manzana</span>
  </button>
</div>

<footer>🐴 Mi Caballo Virtual &nbsp;·&nbsp; ¡Cuídalo bien!</footer>

<script>
const S = {
  happiness: 80,
  hunger: 60,
  energy: 70,
  action: 'idle',
  tailPhase: 0,
  tailDir: 1,
  manePhase: 0,
  blinkTimer: 0
};

const PHRASES = {
  pet:     ['¡Iiiih! 🐴', '¡Qué rico!', '¡Me encanta!', '¡Más caricias!', '¡Soy feliz! ❤️'],
  gallop:  ['¡Al galope!', '¡Voy volando!', '¡Iiiih! 💨', '¡Libre como el viento!'],
  food:    ['¡Ñam ñam!', '¡Deliciosa manzana!', '¡Más por favor!', '¡Gracias! 😋'],
  hungry:  ['Tengo hambre... 🍎', '¿Manzanitas?', '¡Mi estómago gruñe!'],
  tired:   ['Zzz... 💤', 'Necesito descansar', 'Estoy muy cansado...'],
  happy:   ['¡Iiiih! ❤️', '¡Me siento genial!', '¡Qué día tan bonito!', '¡Te quiero!']
};

function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function speak(msg, dur = 2400) {
  const el = document.getElementById('speech');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), dur);
}

function addHeart(x, y) {
  const scene = document.getElementById('scene');
  const el = document.createElement('div');
  el.className = 'heart';
  el.style.left = (x || 80 + Math.random() * 100) + 'px';
  el.style.top  = (y || 30 + Math.random() * 20) + 'px';
  el.textContent = ['❤️','💖','💗','🧡'][Math.floor(Math.random() * 4)];
  scene.appendChild(el);
  setTimeout(() => el.remove(), 1100);
}

function updateBars() {
  document.getElementById('h-bar').style.width = S.happiness + '%';
  document.getElementById('f-bar').style.width = S.hunger + '%';
  document.getElementById('e-bar').style.width = S.energy + '%';
  let mood;
  if (S.hunger < 20)        mood = '😢 Tu caballo tiene mucha hambre';
  else if (S.energy < 20)   mood = '😴 Tu caballo está agotado';
  else if (S.happiness > 85) mood = '🥰 Tu caballo está encantado de la vida';
  else if (S.happiness > 55) mood = '😊 Tu caballo está tranquilo y feliz';
  else                       mood = '😐 Tu caballo necesita más atención';
  document.getElementById('mood-text').textContent = mood;
  document.getElementById('zzz').style.opacity = S.energy < 22 ? '1' : '0';
}

/* ── ACTIONS ── */
function petHorse() {
  if (S.action !== 'idle') return;
  S.action = 'pet';
  S.happiness = Math.min(100, S.happiness + 15);
  S.energy    = Math.max(0, S.energy - 4);
  document.getElementById('sparkles').style.opacity = '1';
  document.getElementById('blush').style.opacity = '0.85';
  speak(rand(PHRASES.pet));
  addHeart(100, 25); addHeart(140, 35);
  setTimeout(() => {
    document.getElementById('sparkles').style.opacity = '0';
    document.getElementById('blush').style.opacity = '0';
    S.action = 'idle';
  }, 1900);
  updateBars();
}

function gallop() {
  if (S.action !== 'idle') return;
  if (S.energy < 18) { speak(rand(PHRASES.tired)); return; }
  S.action = 'gallop';
  S.happiness = Math.min(100, S.happiness + 22);
  S.energy    = Math.max(0, S.energy - 25);
  speak(rand(PHRASES.gallop));
  document.getElementById('sweat').style.opacity = '0.8';

  const horse = document.getElementById('horse');
  const svg   = document.getElementById('horse-svg');
  horse.style.left = '220px';

  let bounce = 0;
  const bi = setInterval(() => {
    bounce++;
    svg.style.transform = bounce % 2 === 0 ? 'translateY(-8px) rotate(-3deg)' : 'translateY(0) rotate(2deg)';
  }, 130);

  setTimeout(() => {
    clearInterval(bi);
    svg.style.transform = '';
    horse.style.left = '110px';
    document.getElementById('sweat').style.opacity = '0';
    addHeart(120, 28); addHeart(160, 38);
    S.action = 'idle';
  }, 1400);
  updateBars();
}

function feedHorse() {
  if (S.action !== 'idle') return;
  if (S.hunger >= 95) { speak('¡Estoy lleno! 😌'); return; }
  S.action = 'eat';
  S.hunger    = Math.min(100, S.hunger + 28);
  S.happiness = Math.min(100, S.happiness + 10);

  const food  = document.getElementById('food');
  const horse = document.getElementById('horse');
  food.style.display = 'block';
  food.style.left = '35px';
  speak(rand(PHRASES.food));

  setTimeout(() => {
    horse.style.left = '22px';
    setTimeout(() => {
      food.style.display = 'none';
      horse.style.left = '110px';
      addHeart(90, 28); addHeart(130, 38);
      S.action = 'idle';
    }, 950);
  }, 420);
  updateBars();
}

/* ── ANIMATIONS ── */
// Tail sway
setInterval(() => {
  S.tailPhase += S.tailDir * 5.5;
  if (Math.abs(S.tailPhase) > 22) S.tailDir *= -1;
  const speed = S.happiness > 55 ? 1 : 0.35;
  const a = S.tailPhase * speed;
  const t1 = document.getElementById('tail1');
  const t2 = document.getElementById('tail2');
  const t3 = document.getElementById('tail3');
  if (t1) t1.setAttribute('d', `M105 60 Q${122+a*0.4} ${52+a*0.2} ${118+a*0.6} ${36+a*0.3} Q${116+a*0.5} 24 ${122+a*0.7} 16`);
  if (t2) t2.setAttribute('d', `M105 62 Q${124+a*0.5} ${58+a*0.2} ${121+a*0.7} ${46+a*0.3} Q${119+a*0.5} 35 ${126+a*0.8} 28`);
  if (t3) t3.setAttribute('d', `M104 65 Q${118+a*0.45} ${65+a*0.15} ${120+a*0.65} ${55+a*0.25} Q${122+a*0.5} 45 ${128+a*0.75} 40`);
}, 85);

// Mane gentle sway
setInterval(() => {
  S.manePhase += 0.07;
  const offset = Math.sin(S.manePhase) * 2.5;
  const mane = document.getElementById('mane');
  if (mane) mane.setAttribute('transform', `translateX(${offset * 0.4})`);
}, 80);

// Blink
setInterval(() => {
  S.blinkTimer++;
  if (S.blinkTimer % 38 === 0) {
    const eye = document.getElementById('eye-pupil');
    if (!eye) return;
    eye.setAttribute('ry', '0.4');
    setTimeout(() => eye.setAttribute('ry', '2.2'), 130);
  }
}, 200);

// Passive decay
setInterval(() => {
  S.hunger    = Math.max(0, S.hunger - 1);
  S.happiness = Math.max(0, S.happiness - 0.5);
  if (S.action === 'idle') S.energy = Math.min(100, S.energy + 0.35);
  updateBars();
}, 3000);

// Idle chatter
setInterval(() => {
  if (S.action !== 'idle') return;
  if (S.hunger < 22)      speak(rand(PHRASES.hungry));
  else if (S.energy < 20) speak(rand(PHRASES.tired));
  else if (Math.random() < 0.35) speak(rand(PHRASES.happy));
}, 7000);

updateBars();
</script>
</body>
</html>
